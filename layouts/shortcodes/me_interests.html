{{ $author := site.GetPage "/authors" }}
{{ if $author }}
  <ul class="space-y-2 font-medium text-slate-700 dark:text-slate-300">
    {{ range $author.Params.interests }}
      <li class="flex items-center gap-2">
        <span class="text-primary-500">▶</span> {{ . }}
      </li>
    {{ end }}
  </ul>
{{ end }}
